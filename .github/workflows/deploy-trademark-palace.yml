name: Deploy Trademark Palace to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "trademark-palace-web/**"
      - "docs/data/trademark-palace.json"
      - "docs/data/patent-palace.json"
      - "docs/data/copyright-palace.json"
      - "docs/data/competition-palace.json"
      - ".github/workflows/deploy-trademark-palace.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-trademark-palace
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: trademark-palace-web/package-lock.json

      - name: Sync palace JSON into public/data
        run: |
          mkdir -p trademark-palace-web/public/data
          cp docs/data/trademark-palace.json trademark-palace-web/public/data/trademark-palace.json
          cp docs/data/patent-palace.json trademark-palace-web/public/data/patent-palace.json
          cp docs/data/copyright-palace.json trademark-palace-web/public/data/copyright-palace.json
          cp docs/data/competition-palace.json trademark-palace-web/public/data/competition-palace.json

      - name: Resolve BASE_PATH
        id: base
        run: |
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            echo "value=${{ vars.BASE_PATH }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install & build
        working-directory: trademark-palace-web
        env:
          BASE_PATH: ${{ steps.base.outputs.value }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: trademark-palace-web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
